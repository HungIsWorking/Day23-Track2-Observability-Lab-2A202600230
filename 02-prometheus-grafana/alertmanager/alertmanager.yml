global:
  resolve_timeout: 1m

route:
  receiver: 'null'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: 'slack-critical'
      continue: true
    - matchers:
        - severity = "warning"
      receiver: 'slack-default'

receivers:
  - name: 'null'
    # No-op receiver — used as the default when no routes match.

  - name: 'slack-default'
    webhook_configs:
      - url: 'http://localhost:1'   # placeholder — set a real Slack webhook URL here
        send_resolved: true

  - name: 'slack-critical'
    webhook_configs:
      - url: 'http://localhost:1'   # placeholder — set a real Slack webhook URL here
        send_resolved: true

inhibit_rules:
  # If the whole service is down, don't also page about latency on it.
  - source_matchers: [alertname = "ServiceDown"]
    target_matchers: [severity = "warning"]
    equal: [service]
